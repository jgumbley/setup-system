---
machine_paths:
  "hal":
    workspace_root: /home/system/wip
    openmw_root: /home/system/wip/mw
    games_root: /home/system/wip/games

machine_utility_packages:
  "hal":
    - adb
    - usbutils

machine_configs:
  # Future Ubuntu 26.04 machine, commissioned after existing-machine backups are verified.
  "legobrick":
    - terminal
    - ssh_host
    - realtime-audio

  # Future lean Ubuntu 26.04 Sway laptop.
  "rocks":
    - terminal
    - sway-desktop
    - sway-fpreader
    - openmw
    - moonlight
  
  # HAL machine configuration
  "hal":
    - terminal
    - sway-desktop
    - hal_hardware
    - ssh_host
    - docker
    - sunshine-host
    - openmw
    - steam
    - wivrn
    - openclaw
  
  # Current host (auto-detected as "system")
  "system":
    - nas-mount
    - sway-desktop
    - openmw
    - emulators
    - godot
    - sway-backlight
    - tp_firmware
    - moonlight

  # macOS host "arnold" – ensure NAS is mounted during setup
  "arnold":
    - nas-mount
  

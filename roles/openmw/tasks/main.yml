---
- name: Ensure add-apt-repository is available
  ansible.builtin.apt:
    name: software-properties-common
    state: present
    cache_valid_time: 3600
  become: yes
  when: ansible_facts['distribution_version'] is version('26.04', '<')

- name: Add OpenMW stable PPA
  ansible.builtin.apt_repository:
    repo: ppa:openmw/openmw
    state: present
    update_cache: yes
  become: yes
  when: ansible_facts['distribution_version'] is version('26.04', '<')

- name: Add OpenMW daily builds PPA
  ansible.builtin.apt_repository:
    repo: ppa:openmw/openmw-daily
    state: present
    update_cache: yes
  become: yes
  when: ansible_facts['distribution_version'] is version('26.04', '<')

- name: Remove obsolete OpenMW PPAs from Ubuntu 26.04
  ansible.builtin.shell: |
    find /etc/apt/sources.list.d -maxdepth 1 -type f \
      \( -name 'openmw-ubuntu-openmw-*.list' \
      -o -name 'openmw-ubuntu-openmw-*.sources' \) \
      -print -delete
  args:
    executable: /bin/bash
  register: openmw_ppa_cleanup
  changed_when: openmw_ppa_cleanup.stdout != ''
  become: yes
  when: ansible_facts['distribution_version'] is version('26.04', '>=')

- name: Install or upgrade OpenMW
  ansible.builtin.apt:
    name:
      - openmw
      - openmw-launcher
      - openmw-cs
      - libopenscenegraph-dev
    state: latest
    cache_valid_time: 3600
  become: yes

- name: Install Morrowind content creation toolchain (apt)
  ansible.builtin.apt:
    name:
      - blender
      - dosbox
      - gimp
      - audacity
    state: present
    cache_valid_time: 3600
  become: yes

- name: Configure Sunshine controller forwarding on hal
  when: ansible_facts['hostname'] == "hal"
  vars:
    sunshine_input_user: "{{ ansible_facts['env'].SUDO_USER | default(lookup('env', 'USER'), true) }}"
  block:
    - name: Load uinput kernel module for Sunshine
      ansible.builtin.modprobe:
        name: uinput
        state: present
      become: yes

    - name: Load uinput kernel module at boot
      ansible.builtin.copy:
        dest: /etc/modules-load.d/uinput.conf
        owner: root
        group: root
        mode: '0644'
        content: |
          uinput
      become: yes

    - name: Ensure input group exists for Sunshine
      ansible.builtin.group:
        name: input
        state: present
      become: yes

    - name: Add setup user to input group for Sunshine
      ansible.builtin.user:
        name: "{{ sunshine_input_user }}"
        groups: input
        append: yes
      become: yes

    # seatd provides the seat/session that wlroots' libinput backend needs to
    # read Sunshine's uinput passthrough devices natively (headless,libinput
    # sway). Without it the libinput backend fails: "Timeout waiting session to
    # become active". Installed only on hal where the Sunshine stream runs.
    - name: Install seatd for wlroots libinput session management
      ansible.builtin.apt:
        name: seatd
        state: present
        cache_valid_time: 3600
      become: yes

    - name: Enable and start seatd service
      ansible.builtin.systemd:
        name: seatd
        enabled: yes
        state: started
        daemon_reload: yes
      become: yes

    - name: Install udev rule for Sunshine uinput access
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/85-sunshine-uinput.rules
        owner: root
        group: root
        mode: '0644'
        content: |
          KERNEL=="uinput", GROUP="input", MODE="0660", OPTIONS+="static_node=uinput"
      register: sunshine_uinput_rules
      become: yes

    - name: Reload udev rules for Sunshine uinput access
      ansible.builtin.command: udevadm control --reload-rules
      when: sunshine_uinput_rules.changed
      become: yes

    - name: Apply Sunshine uinput udev rule
      ansible.builtin.command: udevadm trigger --sysname-match=uinput
      when: sunshine_uinput_rules.changed
      failed_when: false
      become: yes

    - name: Ensure live uinput device uses Sunshine group ownership
      ansible.builtin.file:
        path: /dev/uinput
        owner: root
        group: input
        mode: '0660'
      become: yes

    - name: Ensure live uinput ACL allows Sunshine input group
      ansible.builtin.command: setfacl -m g::rw,g:input:rw,m::rw /dev/uinput
      changed_when: false
      become: yes

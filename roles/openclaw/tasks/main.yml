---
- name: Remove OpenClaw global npm packages
  npm:
    name: "{{ item }}"
    global: yes
    state: absent
  become: "{{ ansible_facts['os_family'] != 'Darwin' }}"
  loop:
    - clawdbot
    - openclaw
  register: openclaw_removal_result

- name: Display OpenClaw removal status
  debug:
    msg: "OpenClaw global npm packages {{ 'removed' if openclaw_removal_result.changed else 'already absent' }}"

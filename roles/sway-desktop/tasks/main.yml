---
- name: Check whether the Firefox Snap is installed
  become: yes
  command: snap list firefox
  register: firefox_snap
  changed_when: false
  failed_when: firefox_snap.rc not in [0, 1]

- name: Remove the Firefox Snap
  become: yes
  command: snap remove firefox
  when: firefox_snap.rc == 0

- name: Remove obsolete Mozilla Team PPA configuration
  become: yes
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/mozillateam-ppa.list
    - /etc/apt/preferences.d/mozillateam-firefox
    - /etc/apt/keyrings/mozillateam-ppa.asc

- name: Ensure APT keyrings directory exists for Mozilla
  become: yes
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Mozilla package signing key over HTTPS
  become: yes
  get_url:
    url: https://packages.mozilla.org/apt/repo-signing-key.gpg
    dest: /etc/apt/keyrings/packages.mozilla.org.asc
    mode: '0644'

- name: Configure Mozilla package repository for Firefox
  become: yes
  copy:
    dest: /etc/apt/sources.list.d/mozilla.sources
    content: |
      Types: deb
      URIs: https://packages.mozilla.org/apt
      Suites: mozilla
      Components: main
      Signed-By: /etc/apt/keyrings/packages.mozilla.org.asc
    owner: root
    group: root
    mode: '0644'

- name: Prefer Mozilla Firefox packages
  become: yes
  copy:
    dest: /etc/apt/preferences.d/mozilla
    content: |
      Package: *
      Pin: origin packages.mozilla.org
      Pin-Priority: 1000
    owner: root
    group: root
    mode: '0644'

- name: Install Mozilla deb Firefox
  become: yes
  apt:
    name: firefox
    state: present
    update_cache: yes
    allow_downgrade: yes

- name: Verify Firefox is installed as a deb
  command: dpkg-query -W -f='${Status}' firefox
  register: firefox_deb
  changed_when: false
  failed_when: firefox_deb.stdout != 'install ok installed'

- name: Verify the Mozilla Firefox binary is installed
  stat:
    path: /usr/lib/firefox/firefox
  register: firefox_binary
  failed_when: not firefox_binary.stat.exists or not firefox_binary.stat.executable

- name: Verify the Firefox Snap is absent
  become: yes
  command: snap list firefox
  register: firefox_snap_check
  changed_when: false
  failed_when: firefox_snap_check.rc != 1

- name: Install sway
  become: yes
  apt:
    name: 
      - 1password
      - sway
      - wayvnc
      - swayidle
      - swaylock
      - waybar
      - upower
      - kitty
      - light
      - swaybg
      - wev
      - pavucontrol
      - network-manager
      - brightnessctl
      - wofi
      - grim
      - slurp
      - wtype
      - ydotool
    state: present

- name: Ensure the sway configuration directory exists
  become: no
  ansible.builtin.file:
    path: ~/.config/sway 
    state: directory
    mode: '0755'

- name: Ensure user environment.d directory exists
  become: no
  ansible.builtin.file:
    path: ~/.config/environment.d
    state: directory
    mode: '0755'

- name: Set wlroots DRM environment flags
  become: no
  ansible.builtin.template:
    src: wlroots.conf.j2
    dest: ~/.config/environment.d/wlroots.conf
    mode: '0644'

- name: Copy sway config
  become: no
  template:
    src: swayconfig.j2
    dest: ~/.config/sway/config
  notify: reload sway

- name: Ensure the waybar configuration directory exists
  become: no
  ansible.builtin.file:
    path: ~/.config/waybar
    state: directory
    mode: '0755'

- name: Include wallpaper tasks
  include_tasks: wallpaper.yml


- name: Copy config 
  become: no
  template:
    src: waybar.j2
    dest: ~/.config/waybar/config.jsonc
  notify: reload sway

- name: Copy waybar style
  become: no
  template:
    src: waybar.css.j2
    dest: ~/.config/waybar/style.css
  notify: reload sway

- name: Create screenshots directory
  become: no
  file:
    path: ~/Pictures/screenshots
    state: directory
    mode: "0755"

- name: Create wallpapers directory
  become: no
  file:
    path: ~/Pictures/wallpapers
    state: directory
    mode: "0755"

- name: Ensure wofi configuration directory exists
  ansible.builtin.file:
    path: ~/.config/wofi
    state: directory
    mode: '0755'

- name: Copy wofi config file
  template:
    src: wofi-config.j2
    dest: ~/.config/wofi/config

- name: Copy wofi style file
  template:
    src: wofi-style.css.j2
    dest: ~/.config/wofi/style.css

- name: Include kanshi tasks
  include_tasks: kanshi.yml

- name: Ensure applications directory exists
  become: no
  ansible.builtin.file:
    path: ~/.local/share/applications
    state: directory
    mode: '0755'

- name: Add RimWorld launcher (.desktop)
  become: no
  ansible.builtin.template:
    src: rimworld.desktop.j2
    dest: ~/.local/share/applications/rimworld.desktop
    mode: '0644'

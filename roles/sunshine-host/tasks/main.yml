---
- name: Require the supported HAL platform for Sunshine Host
  ansible.builtin.assert:
    that:
      - ansible_facts['distribution'] == 'Ubuntu'
      - ansible_facts['distribution_version'] == '24.04'
      - ansible_facts['architecture'] in ['x86_64', 'amd64']
    fail_msg: >-
      The Sunshine role is pinned for Ubuntu 24.04 amd64; detected
      {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
      {{ ansible_facts['architecture'] }}.

- name: Set pinned Sunshine package facts
  ansible.builtin.set_fact:
    sunshine_version: "2026.516.143833"
    sunshine_deb_path: "/var/cache/setup-system/sunshine-ubuntu-24.04-amd64-2026.516.143833.deb"
    sunshine_deb_url: >-
      https://github.com/LizardByte/Sunshine/releases/download/v2026.516.143833/sunshine-ubuntu-24.04-amd64.deb
    sunshine_deb_sha256: "6df8900f23c9c056252eea51639507b8239a1d1241308ab8923cb402b0ca653b"
    sunshine_input_user: system

- name: Create setup-system package cache
  ansible.builtin.file:
    path: /var/cache/setup-system
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download the pinned Sunshine Ubuntu package
  ansible.builtin.get_url:
    url: "{{ sunshine_deb_url }}"
    dest: "{{ sunshine_deb_path }}"
    checksum: "sha256:{{ sunshine_deb_sha256 }}"
    owner: root
    group: root
    mode: '0644'

- name: Install Sunshine as an operating-system package
  ansible.builtin.apt:
    deb: "{{ sunshine_deb_path }}"
    state: present

- name: Verify the native Sunshine binary
  ansible.builtin.command: /usr/bin/sunshine --version
  register: sunshine_version_output
  changed_when: false
  failed_when: >-
    sunshine_version_output.rc != 0 or
    sunshine_version not in (sunshine_version_output.stdout ~ sunshine_version_output.stderr)

- name: Load uinput kernel module for Sunshine
  ansible.builtin.modprobe:
    name: uinput
    state: present

- name: Load uinput kernel module at boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/uinput.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      uinput

- name: Ensure input group exists for Sunshine
  ansible.builtin.group:
    name: input
    state: present

- name: Add setup user to input group for Sunshine
  ansible.builtin.user:
    name: "{{ sunshine_input_user }}"
    groups: input
    append: yes

# seatd provides the seat/session that wlroots' libinput backend needs to read
# Sunshine's uinput passthrough devices in the headless Sway session.
- name: Install seatd for wlroots libinput session management
  ansible.builtin.apt:
    name: seatd
    state: present
    cache_valid_time: 3600

- name: Enable and start seatd service
  ansible.builtin.systemd:
    name: seatd
    enabled: yes
    state: started
    daemon_reload: yes

- name: Remove legacy local Sunshine uinput rule
  ansible.builtin.file:
    path: /etc/udev/rules.d/85-sunshine-uinput.rules
    state: absent
  register: sunshine_uinput_rules

- name: Reload package-owned Sunshine udev rules
  ansible.builtin.command: udevadm control --reload-rules
  when: sunshine_uinput_rules.changed

- name: Apply package-owned Sunshine uinput rule
  ansible.builtin.command: udevadm trigger --sysname-match=uinput
  when: sunshine_uinput_rules.changed

- name: Ensure live uinput device uses Sunshine group ownership
  ansible.builtin.file:
    path: /dev/uinput
    owner: root
    group: input
    mode: '0660'

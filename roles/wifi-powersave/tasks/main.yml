---
- name: Detect active Wi-Fi connection
  shell: >-
    nmcli -t -f NAME,TYPE connection show --active
    | awk -F: '$2=="802-11-wireless"{print $1; exit}'
  register: active_wifi_connection
  changed_when: false

- name: Disable Wi-Fi power save for active connection
  command: >-
    nmcli connection modify "{{ active_wifi_connection.stdout }}"
    802-11-wireless.powersave 2
  when: active_wifi_connection.stdout | length > 0
  become: yes

---
- name: Set platform facts
  set_fact:
    is_mac: "{{ ansible_facts['os_family'] == 'Darwin' }}"
    is_linux: "{{ ansible_facts['os_family'] in ['Debian', 'RedHat'] }}"
    is_arm: "{{ ansible_facts['architecture'] == 'arm64' or ansible_facts['architecture'] == 'aarch64' }}"
    homebrew_prefix: "{{ '/opt/homebrew' if ansible_facts['architecture'] == 'arm64' else '/usr/local' }}"
    platform_name: "{{ 'ubuntu' if ansible_facts['os_family'] == 'Debian' else ansible_facts['os_family'] | lower }}"

- name: Display detected platform information
  debug:
    msg:
      - "Platform: {{ ansible_facts['os_family'] }} ({{ ansible_facts['system'] }})"
      - "Architecture: {{ ansible_facts['architecture'] }}"
      - "Is Mac: {{ is_mac }}"
      - "Is Linux: {{ is_linux }}"
      - "Is ARM: {{ is_arm }}"
      - "Homebrew prefix: {{ homebrew_prefix }}"
      - "Platform name: {{ platform_name }}"
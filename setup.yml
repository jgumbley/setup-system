---
- hosts: localhost
  connection: local
  pre_tasks:
    - name: Align macOS hostnames with ComputerName
      block:
        - name: Read macOS ComputerName
          command: scutil --get ComputerName
          register: mac_computer_name
          changed_when: false

        - name: Read macOS LocalHostName
          command: scutil --get LocalHostName
          register: mac_local_hostname
          changed_when: false
          failed_when: mac_local_hostname.rc not in [0, 1]

        - name: Read macOS HostName
          command: scutil --get HostName
          register: mac_host_name
          changed_when: false
          failed_when: mac_host_name.rc not in [0, 1]

        - name: Sync LocalHostName to ComputerName
          become: yes
          command:
            argv:
              - scutil
              - --set
              - LocalHostName
              - "{{ mac_computer_name.stdout }}"
          when: mac_local_hostname.rc != 0 or mac_local_hostname.stdout != mac_computer_name.stdout

        - name: Sync HostName to ComputerName
          become: yes
          command:
            argv:
              - scutil
              - --set
              - HostName
              - "{{ mac_computer_name.stdout }}"
          when: mac_host_name.rc != 0 or mac_host_name.stdout != mac_computer_name.stdout
      when: ansible_facts['system'] == "Darwin"

    - name: Remove legacy 1Password repo entries with conflicting keyring path
      shell: |
        set -euo pipefail
        for list_file in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
          [ -e "$list_file" ] || continue
          if grep -q "downloads.1password.com" "$list_file"; then
            sed -i '\#/etc/apt/keyrings/1password-archive-keyring.gpg#d' "$list_file"
          fi
        done
      args:
        executable: /bin/bash
      become: yes
      when: ansible_facts['os_family'] == "Debian"
  roles:
    - core-tools
    - onepassword-cli

- hosts: localhost
  connection: local
  become: yes
  gather_facts: yes
  vars_files:
    - machines.yml
  vars:
    fixed_font_family: "DejaVu Sans Mono"
    nas_mount_required: false
  handlers:
    - include_tasks: handlers/main.yml
  tasks:
    - name: Get current hostname
      set_fact:
        current_hostname: "{{ ansible_facts['hostname'] }}"
      tags: always
    
    - name: Require a configuration for the current hostname
      fail:
        msg: "Unknown hostname '{{ current_hostname }}'; add it to machine_configs in machines.yml"
      when: current_hostname not in machine_configs
      tags: always

    - name: Select machine configuration
      set_fact:
        matched_config: "{{ machine_configs[current_hostname] }}"
      tags: always
    
    - name: Display detected configuration
      debug:
        msg: "Hostname: {{ current_hostname }}, applying config: {{ matched_config }}"
      tags: always

    - name: Create setup-system machine configuration directory
      ansible.builtin.file:
        path: /etc/setup-system
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: current_hostname in machine_paths
      tags: always

    - name: Publish Ansible-managed machine locations for utilities
      ansible.builtin.copy:
        dest: "/etc/setup-system/{{ current_hostname }}-locations.mk"
        owner: root
        group: root
        mode: '0644'
        content: |
          # Managed by setup-system for {{ current_hostname }}.
          HAL_WORKSPACE_ROOT := {{ machine_paths[current_hostname].workspace_root }}
          HAL_OPENMW_ROOT := {{ machine_paths[current_hostname].openmw_root }}
          HAL_GAMES_ROOT := {{ machine_paths[current_hostname].games_root }}
      when: current_hostname in machine_paths
      tags: always

    - name: Install machine utility packages
      ansible.builtin.apt:
        name: "{{ machine_utility_packages[current_hostname] }}"
        state: present
        cache_valid_time: 3600
      when: current_hostname in machine_utility_packages
      tags: always
    
    - name: Apply configuration components
      include_role:
        name: "{{ component }}"
      loop: "{{ matched_config }}"
      loop_control:
        loop_var: component
      tags: always
